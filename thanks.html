<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Mango Villa</title>
    
    <!-- Google Fonts නිවැරදි link එක (Poppins font එක සඳහා) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            /* මෙතන font-family එක Google Font එකට ගැලපෙන ලෙස නිවැරදි කර ඇත */
            font-family: 'Poppins', sans-serif;
            background-color: #0b1c3f; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .thank-you-card {
            background: white;
            color: #333;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #d4edda;
            color: #28a745;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #0b1c3f;
            margin: 0 0 10px 0; /* Margin එක පැහැදිලිව සකස් කිරීම */
            font-weight: 600;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: #0b1c3f;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
        }
        .btn-home:hover {
            background-color: #1a3a7a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-box">
            ✔
        </div>
        <h1>Thank You!</h1>
        <p>Your message has been successfully sent to <strong>Mango Villa</strong>. We appreciate you reaching out and our team will get back to you shortly.</p>
        
        <a href="index.html" class="btn-home">Back to Home</a>
    </div>

</body>
</html>
